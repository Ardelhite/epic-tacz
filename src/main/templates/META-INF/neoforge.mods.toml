modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/Ardelhite/epic-tacz/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="ImperialArchitects"
# Client-only patch: nothing to do on a dedicated server.
side="CLIENT"
description='''
EpicFightとTacZを併用した際に一人称視点でTacZの銃アニメーションが描画されない問題を回避する互換パッチMOD。
TacZの銃を保持している間、EpicFightのバトルモードへの遷移を抑制し、自動的に通常モードに戻す。
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="tacz"
type="required"
versionRange="[1.1.0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="epicfight"
type="required"
versionRange="[21.0.0,)"
ordering="AFTER"
side="CLIENT"
